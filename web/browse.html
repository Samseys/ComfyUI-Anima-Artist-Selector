<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0b0c12">
<title>Anima Artist Library</title>
<style>
  :root{color-scheme:dark;--bg:#0d0e12;--panel:#15161c;--panel2:#1b1c23;--text:#f2f2f4;--muted:#94959e;--line:#292a31;--accent:#8f82d8;--pink:#e85d8e;font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif}
  *{box-sizing:border-box}body{margin:0;min-height:100vh;background:var(--bg);color:var(--text)}button,input{font:inherit}.shell{width:min(1500px,100%);margin:auto;padding:24px 24px 60px}
  .top{position:sticky;top:0;z-index:20;margin:-24px -24px 0;padding:20px 24px 14px;background:#0d0e12ed;border-bottom:1px solid #ffffff08;backdrop-filter:blur(16px)}
  .headline{display:grid;grid-template-columns:auto minmax(260px,680px) auto;align-items:center;justify-content:space-between;gap:22px}.brand{display:flex;align-items:center;gap:12px;white-space:nowrap}.mark{display:grid;place-items:center;width:38px;height:38px;border-radius:11px;background:#7569bb;color:#fff;font-weight:800}.title{font-weight:720;letter-spacing:-.02em}.subtitle{font-size:12px;color:var(--muted);margin-top:1px}
  .search-wrap{position:relative}.search-wrap:before{content:"⌕";position:absolute;left:16px;top:8px;font-size:25px;color:#aaa8b7;pointer-events:none}#search{width:100%;height:48px;padding:0 48px;border:1px solid var(--line);border-radius:16px;background:#171922cc;color:white;outline:none;box-shadow:0 10px 30px #0003}#search:focus{border-color:#8f7be8;box-shadow:0 0 0 3px #8f7be824,0 12px 32px #0004}#clear-search{position:absolute;right:9px;top:8px;width:32px;height:32px;border:0;border-radius:10px;background:transparent;color:var(--muted);cursor:pointer;font-size:18px}#clear-search:hover{background:#ffffff0c;color:white}
  .actions{display:flex;gap:8px}.icon-button,.action-button{height:42px;border:1px solid var(--line);border-radius:12px;background:var(--panel2);color:#dedce7;cursor:pointer}.icon-button{width:42px;font-size:19px}.action-button{padding:0 14px}.icon-button:hover,.action-button:hover{border-color:#514d69;background:#202331;color:white}.menu-wrap{position:relative}.menu{display:none;position:absolute;right:0;top:48px;width:205px;padding:7px;border:1px solid var(--line);border-radius:14px;background:#181a24f7;box-shadow:0 18px 50px #0009;backdrop-filter:blur(18px)}.menu.open{display:block}.menu button{display:block;width:100%;padding:10px 11px;border:0;border-radius:9px;background:transparent;color:#ddd;text-align:left;cursor:pointer}.menu button:hover{background:#ffffff0b;color:white}.menu .dangerless{color:#b6add9}
  .controls{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-top:14px}.segments{display:flex;padding:3px;border:1px solid var(--line);border-radius:12px;background:#121318}.segments button{height:34px;padding:0 15px;border:0;border-radius:8px;background:transparent;color:var(--muted);cursor:pointer;transition:color .18s,background .18s}.segments button.active{background:#26272e;color:white}.meta{display:grid;grid-template-columns:auto 4px auto 112px 108px;align-items:center;gap:10px;color:var(--muted);font-size:13px}.dot{width:4px;height:4px;border-radius:50%;background:#55565e}#sort{box-sizing:border-box;width:112px;height:36px;margin:0;padding:0 10px;border:1px solid var(--line);border-radius:10px;appearance:none;background:#15161b;color:#c8c5d2;cursor:pointer;text-align:center;text-align-last:center;font:13px/1 Inter,system-ui,sans-serif}#shuffle{box-sizing:border-box;width:108px;height:36px;margin:0;padding:0 10px;border:1px solid var(--line);border-radius:10px;background:transparent;color:#c8c5d2;cursor:pointer;white-space:nowrap;transition:background .18s,color .18s,transform .18s,opacity .18s}#shuffle.inactive{visibility:hidden;pointer-events:none}#shuffle:hover{background:#ffffff09;color:white}#shuffle:active{transform:rotate(-12deg) scale(.97)}
  .grid{display:block;padding-top:16px}.page-chunk{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px;margin-bottom:16px;overflow:hidden}.page-chunk.is-restored .card{animation:none;opacity:1}.scroll-sentinel{height:1px;pointer-events:none}.card{position:relative;min-width:0;border:1px solid #ffffff0c;border-radius:14px;background:var(--panel);overflow:hidden;opacity:0;animation:card-in .42s cubic-bezier(.2,.75,.25,1) forwards;animation-delay:calc(var(--i)*24ms);transition:border-color .22s,background .22s}.card:hover{border-color:#ffffff20;background:#18191f}@keyframes card-in{from{opacity:0;transform:translateY(9px) scale(.992)}to{opacity:1;transform:none}}.copy-image{all:unset;display:block;width:100%;cursor:pointer;position:relative;overflow:hidden;background:#16171b}.copy-image:after{content:"Copy handle";position:absolute;left:50%;bottom:12px;translate:-50% 0;padding:6px 10px;border:1px solid #ffffff1a;border-radius:8px;background:#111217e8;color:#eee;font-size:12px;opacity:0;transition:opacity .18s;pointer-events:none;white-space:nowrap}.copy-image:hover:after{opacity:1}.copy-image img{display:block;width:100%;height:auto;aspect-ratio:832/1216;object-fit:contain;background:#16171b;transition:filter .25s}.copy-image:active img{filter:brightness(.9)}.image-fade{display:none}
  .heart{position:absolute;z-index:3;top:10px;right:10px;display:grid;place-items:center;width:36px;height:36px;padding:0;border:1px solid #ffffff24;border-radius:50%;background:#15161dcc;color:#e8e8eb;font-size:19px;line-height:1;cursor:pointer;backdrop-filter:blur(10px);transition:background .2s,color .2s,border-color .2s}.heart:hover{background:#202128}.heart.on{border-color:#e85d8e80;background:#e85d8e;color:white}.heart.bump{animation:bump .3s cubic-bezier(.2,.85,.3,1)}@keyframes bump{45%{transform:scale(1.2)}75%{transform:scale(.96)}}
  .missing-preview{display:grid;place-items:center;width:100%;aspect-ratio:832/1216;background:#17181d;color:#777983;text-align:center;font-size:12px;letter-spacing:.01em}.missing-preview span{max-width:110px;line-height:1.45}.stat{position:absolute;z-index:2;left:10px;bottom:55px;padding:6px 8px;border:1px solid #ffffff1c;border-radius:8px;background:#111217d9;color:#eee;font-size:11px;font-weight:650;backdrop-filter:blur(8px);pointer-events:none}.rank{left:auto;right:10px}.caption{position:relative;padding:12px 13px 13px;pointer-events:none;border-top:1px solid #ffffff0b}.name{font-size:13px;font-weight:600;letter-spacing:.003em;overflow-wrap:anywhere;color:#e9e9ec}.empty{grid-column:1/-1;display:grid;place-items:center;min-height:45vh;color:var(--muted);text-align:center;animation:card-in .35s ease forwards}.empty strong{display:block;color:#ddd;font-size:18px;margin-bottom:6px}
  .toast{position:fixed;z-index:100;left:50%;bottom:28px;translate:-50% 20px;padding:11px 16px;border:1px solid #ffffff1c;border-radius:13px;background:#1d202beF;color:#f4f2f8;box-shadow:0 15px 40px #0009;opacity:0;pointer-events:none;transition:.22s;backdrop-filter:blur(16px)}.toast.show{opacity:1;translate:-50% 0}
  #file{display:none}
  @media(max-width:850px){.shell{padding:14px 14px 48px}.top{margin:-14px -14px 0;padding:14px}.headline{grid-template-columns:1fr auto}.brand .subtitle{display:none}.search-wrap{grid-column:1/-1;grid-row:2}.controls{align-items:flex-start}.meta .dot,#status{display:none}.page-chunk{grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:10px}}
  @media(max-width:480px){.brand .title{font-size:14px}.mark{width:34px;height:34px}.actions .action-button{display:none}.controls{gap:10px;flex-wrap:wrap}.segments{flex:1 1 100%}.segments button{flex:1;height:40px;padding:0 11px}.meta{display:flex;flex:1 1 100%;align-items:center;gap:10px}.meta #favorite-count{display:none}#shuffle{padding:0 12px}.grid{padding-top:10px}.caption{padding:10px 11px 11px}.name{font-size:12px}.heart{width:34px;height:34px;top:8px;right:8px}.toast{bottom:18px;max-width:calc(100% - 28px);white-space:nowrap}}
  /* Locally bundled Lucide icon system */
  .ui-icon{display:inline-block;flex:0 0 auto;width:16px;height:16px;background:currentColor;mask:var(--icon) center/contain no-repeat;-webkit-mask:var(--icon) center/contain no-repeat}.i-heart{--icon:url('/extensions/ComfyUI-Anima-Artist-Selector/icons/heart.svg')}.i-x{--icon:url('/extensions/ComfyUI-Anima-Artist-Selector/icons/x.svg')}.i-external{--icon:url('/extensions/ComfyUI-Anima-Artist-Selector/icons/external-link.svg')}.i-menu{--icon:url('/extensions/ComfyUI-Anima-Artist-Selector/icons/ellipsis.svg')}.i-upload{--icon:url('/extensions/ComfyUI-Anima-Artist-Selector/icons/upload.svg')}.i-download{--icon:url('/extensions/ComfyUI-Anima-Artist-Selector/icons/download.svg')}.i-refresh{--icon:url('/extensions/ComfyUI-Anima-Artist-Selector/icons/refresh-cw.svg')}.i-compass{--icon:url('/extensions/ComfyUI-Anima-Artist-Selector/icons/compass.svg')}
  .search-wrap:before{content:"";left:17px;top:16px;width:17px;height:17px;background:#aaa8b7;mask:url('/extensions/ComfyUI-Anima-Artist-Selector/icons/compass.svg') center/contain no-repeat;-webkit-mask:url('/extensions/ComfyUI-Anima-Artist-Selector/icons/compass.svg') center/contain no-repeat}.actions button,#clear-search,.menu button,.segments button,#shuffle{display:flex;align-items:center;justify-content:center;gap:7px}.menu button{justify-content:flex-start}.icon-button{font-size:0}.meta{grid-template-columns:auto 4px auto 126px 112px}#sort{width:126px;padding:0 34px 0 12px;text-align:left;text-align-last:left;background:#15161b url('/extensions/ComfyUI-Anima-Artist-Selector/icons/chevron-down.svg') right 11px center/14px no-repeat}#shuffle{width:112px}.heart{font-size:0}.heart .ui-icon{width:18px;height:18px}
  /* Mobile: balanced two-row controls — full-width segmented toggle, equal sort/shuffle pair. */
  @media(max-width:480px){#sort,#shuffle{flex:1 1 0;width:auto;min-width:0;height:40px}#sort{background-position:right 12px center}#shuffle.inactive{display:none}}
</style>
</head>
<body>
<main class="shell">
  <header class="top">
    <div class="headline">
      <div class="brand"><div class="mark">A</div><div><div class="title">Anima Artists</div><div class="subtitle">Visual style library</div></div></div>
      <div class="search-wrap"><input id="search" type="search" autocomplete="off" placeholder="Search 42,509 artists"><button id="clear-search" title="Clear search" aria-label="Clear search"><span class="ui-icon i-x" aria-hidden="true"></span></button></div>
      <div class="actions">
        <button id="open" class="action-button"><span class="ui-icon i-compass" aria-hidden="true"></span><span>Style Explorer</span><span class="ui-icon i-external" aria-hidden="true"></span></button>
        <div class="menu-wrap"><button id="menu-button" class="icon-button" title="Library options" aria-label="Library options"><span class="ui-icon i-menu" aria-hidden="true"></span></button><div id="menu" class="menu"><button id="import"><span class="ui-icon i-upload" aria-hidden="true"></span><span>Import JSON or TXT</span></button><button id="txt"><span class="ui-icon i-download" aria-hidden="true"></span><span>Export handles as TXT</span></button><button id="json"><span class="ui-icon i-download" aria-hidden="true"></span><span>Export favorites JSON</span></button><button id="open-menu" class="dangerless"><span class="ui-icon i-external" aria-hidden="true"></span><span>Open original Explorer</span></button></div></div>
      </div>
    </div>
    <div class="controls">
      <div class="segments"><button id="all" class="active"><span class="ui-icon i-compass" aria-hidden="true"></span><span>Discover</span></button><button id="favorites"><span class="ui-icon i-heart" aria-hidden="true"></span><span>Favorites</span></button></div>
      <div class="meta"><span id="status">Loading library…</span><span class="dot"></span><span id="favorite-count">0 favorites</span><select id="sort" title="Sort artists"><option value="random">Random</option><option value="name">Name</option><option value="works">Works</option><option value="unique">Unique</option></select><button id="shuffle"><span class="ui-icon i-refresh" aria-hidden="true"></span><span>New mix</span></button></div>
    </div>
  </header>
  <section class="grid" id="grid"></section>
</main>
<input id="file" type="file" accept=".json,.txt">
<div id="toast" class="toast"></div>
<script>
const CDN='https://cdn.jsdelivr.net/gh/ThetaCursed/Anima-Assets@main/base-images';let library={artists:[],explorerData:null},favorites={favorites:[]},map=null,filtered=[],favoritesOnly=false,randomPools={all:[],favorites:[]},renderedCount=0,toastTimer,searchEngine=null,sortMode='random',pageObserver=null,chunkObserver=null;const PAGE_SIZE=48;
const $=s=>document.querySelector(s),clean=s=>String(s||'').trim().replace(/^@/,'');
async function index(){if(map)return map;map=await fetch('/extensions/ComfyUI-Anima-Artist-Selector/artist-map.json').then(r=>r.json());const ranked=Object.values(map).sort((a,b)=>(b.uniqueness_score||0)-(a.uniqueness_score||0));ranked.forEach((x,i)=>x.uniqueness_rank=i+1);return map}
function toast(message){const el=$('#toast');el.textContent=message;el.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),1800)}
function updateMeta(){const count=(favorites.favorites||[]).length;$('#favorite-count').textContent=`${count.toLocaleString()} favorite${count===1?'':'s'}`}
function syncVisibleHearts(){const fav=new Set((favorites.favorites||[]).map(x=>clean(x.name).toLowerCase()));document.querySelectorAll('.card').forEach(card=>{const on=fav.has(clean(card.dataset.name).toLowerCase()),heart=card.querySelector('.heart');heart.classList.toggle('on',on);heart.title=on?'Unfavorite':'Favorite';heart.setAttribute('aria-label',`${on?'Unfavorite':'Favorite'} ${card.dataset.name}`)})}
async function load(){[library,favorites]=await Promise.all([fetch('/anima_artist_selector/library').then(r=>r.json()),fetch('/anima_artist_selector/favorites').then(r=>r.json())]);const total=Object.keys(await index()).length;$('#status').textContent=`${total.toLocaleString()} artists`;updateMeta();await render()}
function sample(a,n){const out=[],used=new Set;while(out.length<Math.min(n,a.length)){const i=Math.floor(Math.random()*a.length);if(!used.has(i)){used.add(i);out.push(a[i])}}return out}
function buildSearch(all){const postings=new Map;all.forEach((x,i)=>{x._search=x.name.toLowerCase();const seen=new Set;for(let j=0;j<=x._search.length-3;j++)seen.add(x._search.slice(j,j+3));for(const g of seen){let list=postings.get(g);if(!list)postings.set(g,list=[]);list.push(i)}});return q=>{q=clean(q).toLowerCase();if(!q)return all;if(q.length<3)return all.filter(x=>x._search.includes(q));const lists=[];for(let i=0;i<=q.length-3;i++)lists.push(postings.get(q.slice(i,i+3))||[]);lists.sort((a,b)=>a.length-b.length);if(!lists[0]?.length)return[];const sets=lists.slice(1).map(x=>new Set(x)),out=[];for(const i of lists[0]){if(sets.some(s=>!s.has(i)))continue;const x=all[i];if(x._search.includes(q))out.push(x)}return out}}
function cardMarkup(x,i,fav){const n=x.name,on=fav.has(n.toLowerCase()),preview=x.missing?'<div class="missing-preview"><span>Preview unavailable</span></div>':`<img loading="lazy" src="${CDN}/${x.p}/${x.id}.webp" alt="Style preview for ${n}">`,stats=x.missing?'':sortMode==='works'?`<span class="stat">${Number(x.post_count||0).toLocaleString()} works</span>`:sortMode==='unique'?`<span class="stat">uniqueness #${Number(x.uniqueness_rank).toLocaleString()}</span>`:'';return `<article class="card" style="--i:${Math.min(i,12)}" data-name="${n.replaceAll('"','&quot;')}"><button class="copy-image" title="Copy @${n}">${preview}</button>${stats}<button class="heart ${on?'on':''}" aria-label="${on?'Unfavorite':'Favorite'} ${n}" title="${on?'Unfavorite':'Favorite'}"><span class="ui-icon i-heart" aria-hidden="true"></span></button><div class="caption"><div class="name">@${n}</div></div></article>`}
function appendPage(){
  if(renderedCount>=filtered.length)return;
  const start=renderedCount,chunk=document.createElement('div'),sentinel=$('#scroll-sentinel');
  chunk.className='page-chunk';
  $('#grid').insertBefore(chunk,sentinel);
  const columns=Math.max(1,getComputedStyle(chunk).gridTemplateColumns.split(' ').filter(Boolean).length);
  const pageSize=columns*Math.ceil(PAGE_SIZE/columns);
  const page=filtered.slice(renderedCount,renderedCount+pageSize);
  renderedCount+=page.length;
  chunk._items=page;
  chunk._start=start;
  chunk._render=restored=>{const fav=new Set((favorites.favorites||[]).map(x=>clean(x.name).toLowerCase()));chunk.classList.toggle('is-restored',restored);chunk.innerHTML=chunk._items.map((x,i)=>cardMarkup(x,chunk._start+i,fav)).join('');bindCards(chunk)};
  chunk._render(false);
  chunkObserver.observe(chunk);
  requestAnimationFrame(()=>{if(renderedCount<filtered.length&&sentinel?.getBoundingClientRect().top<=window.innerHeight+1200)appendPage()});
}
async function render(reshuffle=false){const q=clean($('#search').value).toLowerCase();const idx=await index(),all=Object.values(idx),byName=new Map(all.map(x=>[x.name.toLowerCase(),x]));if(!searchEngine)searchEngine=buildSearch(all);let matches;if(favoritesOnly){const source=(favorites.favorites||[]).map(f=>byName.get(clean(f.name).toLowerCase())||{name:clean(f.name),missing:true});matches=source.filter(x=>!q||x.name.toLowerCase().includes(q))}else matches=searchEngine(q);if(sortMode==='name')matches=[...matches].sort((a,b)=>a.name.localeCompare(b.name));else if(sortMode==='works')matches=[...matches].sort((a,b)=>(b.post_count||0)-(a.post_count||0));else if(sortMode==='unique')matches=[...matches].sort((a,b)=>(b.uniqueness_score||0)-(a.uniqueness_score||0));if(sortMode==='random'&&!q){const key=favoritesOnly?'favorites':'all',available=new Map(matches.map(x=>[x.name.toLowerCase(),x])),retained=reshuffle?[]:randomPools[key].map(n=>available.get(n)).filter(Boolean),used=new Set(retained.map(x=>x.name.toLowerCase())),added=sample(matches.filter(x=>!used.has(x.name.toLowerCase())),matches.length);filtered=[...retained,...added];randomPools[key]=filtered.map(x=>x.name.toLowerCase())}else filtered=matches;renderedCount=0;pageObserver?.disconnect();chunkObserver?.disconnect();$('#grid').innerHTML=filtered.length?'<div id="scroll-sentinel" class="scroll-sentinel" aria-hidden="true"></div>':`<div class="empty"><div><strong>${favoritesOnly?'No favorites here yet':'No artists found'}</strong>${favoritesOnly?'Tap a heart in Discover to build your collection.':'Try a different search.'}</div></div>`;appendPage();const sentinel=$('#scroll-sentinel');if(sentinel)pageObserver.observe(sentinel)}
function bindCards(scope=document){scope.querySelectorAll('.card').forEach(el=>{const name=el.dataset.name;el.querySelector('.copy-image').onclick=async()=>{try{await navigator.clipboard.writeText('@'+name);toast(`Copied @${name}`)}catch{toast(`Could not copy @${name}`)}};el.querySelector('.heart').onclick=async()=>{const heart=el.querySelector('.heart'),on=!heart.classList.contains('on');const r=await fetch('/anima_artist_selector/favorite',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,favorite:on})});if(!r.ok){toast('Could not update favorite');return}const data=await r.json();favorites.favorites=data.favorites||[];heart.classList.toggle('on',on);heart.title=on?'Unfavorite':'Favorite';heart.setAttribute('aria-label',`${on?'Unfavorite':'Favorite'} ${name}`);heart.classList.remove('bump');void heart.offsetWidth;heart.classList.add('bump');updateMeta();if(favoritesOnly&&!on)setTimeout(()=>el.remove(),180);toast(`${on?'Saved':'Removed'} @${name}`)}})}
function setView(favs){favoritesOnly=favs;$('#all').classList.toggle('active',!favs);$('#favorites').classList.toggle('active',favs);render(false)}
function download(name,text,type){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([text],{type}));a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
$('#search').oninput=()=>render(false);$('#clear-search').onclick=()=>{$('#search').value='';render(false);$('#search').focus()};$('#sort').onchange=()=>{sortMode=$('#sort').value;$('#shuffle').classList.toggle('inactive',sortMode!=='random');render(false)};$('#shuffle').onclick=()=>render(true);$('#all').onclick=()=>setView(false);$('#favorites').onclick=()=>setView(true);pageObserver=new IntersectionObserver(entries=>{if(entries.some(entry=>entry.isIntersecting))appendPage()},{root:null,rootMargin:'1200px 0px',threshold:0});chunkObserver=new IntersectionObserver(entries=>{for(const entry of entries){const chunk=entry.target;if(entry.isIntersecting&&chunk.dataset.virtualized==='1'){chunk.dataset.virtualized='0';chunk._render(true)}else if(!entry.isIntersecting&&chunk.dataset.virtualized!=='1'&&chunk.childElementCount){const height=chunk.getBoundingClientRect().height;if(height>0){chunk.style.height=`${height}px`;chunk.innerHTML='';chunk.dataset.virtualized='1'}}}},{root:null,rootMargin:'1800px 0px',threshold:0});
const openExplorer=()=>open('https://thetacursed.github.io/Anima-Style-Explorer/','_blank');$('#open').onclick=openExplorer;$('#open-menu').onclick=openExplorer;
$('#menu-button').onclick=e=>{e.stopPropagation();$('#menu').classList.toggle('open')};document.addEventListener('click',e=>{if(!e.target.closest('.menu-wrap'))$('#menu').classList.remove('open')});
$('#import').onclick=()=>$('#file').click();$('#file').onchange=async()=>{const f=$('#file').files[0];if(!f)return;toast('Importing…');const r=await fetch('/anima_artist_selector/import',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({filename:f.name,content:await f.text()})});if(!r.ok){toast('Import failed');return}await load();toast('Library imported');$('#file').value=''};
$('#txt').onclick=()=>download('anima-artists.txt',library.artists.map(n=>'@'+n).join('\n'),'text/plain;charset=utf-8');$('#json').onclick=()=>{const items=(favorites.favorites||[]).filter(x=>x.id).map(x=>({id:String(x.id),timestamp:x.timestamp}));const d={metadata:{appName:'Anima Style Explorer',exportDate:new Date().toISOString(),favoritesCount:items.length},favorites:items,folderData:null};download('anima-style-favorites.json',JSON.stringify(d,null,2),'application/json')};
const favoriteEvents=new EventSource('/anima_artist_selector/events');favoriteEvents.addEventListener('favorites',event=>{try{const data=JSON.parse(event.data);favorites.favorites=data.favorites||[];updateMeta();if(favoritesOnly)render(false);else syncVisibleHearts()}catch(error){console.warn('Anima favorites sync error',error)}});
load();
</script>
</body></html>
